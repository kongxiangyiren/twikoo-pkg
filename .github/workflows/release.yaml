name: 创建发行版

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.8.1'
          cache: 'npm'
          # architecture: 'x64'

      - run: npm i
      - shell: bash
        run: npm run build:exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
