name: 创建发行版

permissions:
  contents: write
  discussions: write

on:
  push:
    tags:
      - '*.*.*'
    paths-ignore: # 这里表示忽略的文件或目录，不会触发流程
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'
      - '.npmrc'

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.8.1'
          cache: 'npm'
          # architecture: 'x64'

      - run: npm i
      - shell: bash
        run: npm run build:exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            dist/*
